<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 180" role="img" aria-labelledby="title desc">
  <title id="title">Fabric Pulse logo</title>
  <desc id="desc">A green Microsoft Fabric inspired pulse mark with the Fabric Pulse wordmark.</desc>
  <defs>
    <linearGradient id="markGradient" x1="18" y1="18" x2="150" y2="150" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F6B5B"/>
      <stop offset="0.48" stop-color="#00A562"/>
      <stop offset="1" stop-color="#7FBA00"/>
    </linearGradient>
    <linearGradient id="pulseGradient" x1="36" y1="92" x2="132" y2="92" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF" stop-opacity="0.72"/>
      <stop offset="0.45" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.78"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#0F6B5B" flood-opacity="0.22"/>
    </filter>
  </defs>

  <g filter="url(#shadow)">
    <rect x="18" y="18" width="144" height="144" rx="34" fill="url(#markGradient)"/>
    <path d="M45 93h20l13-25 22 48 15-30h21" fill="none" stroke="url(#pulseGradient)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M50 45h74v16H68v26h48v16H68v38H50V45z" fill="#FFFFFF" opacity="0.18"/>
    <circle cx="133" cy="93" r="8" fill="#FFFFFF"/>
  </g>

  <g fill="#242424">
    <text x="194" y="88" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="54" font-weight="800" letter-spacing="-2">Fabric Pulse</text>
    <text x="197" y="124" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="20" font-weight="500" fill="#616161">Public Fabric status and roadmap intelligence</text>
  </g>
</svg>
